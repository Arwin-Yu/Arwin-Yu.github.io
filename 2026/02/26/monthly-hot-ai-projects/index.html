<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每月最热 AI 项目</title>
  <style>
    body { margin:0; font-family: Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#eaf2ff;
      background: linear-gradient(180deg,#080b16 0%, #131b35 55%, #202d56 100%); min-height:100vh; }
    .bg{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(6,10,20,.65),rgba(8,12,24,.35)),url('/img/generated-space-v2/002-ultra-cinematic-deep-space-background-fo.png') center/cover no-repeat;}
    .wrap{max-width:980px;margin:0 auto;padding:46px 18px 80px;}
    h1{margin:0 0 8px}.sub{opacity:.85;margin:0 0 18px}
    .tip{font-size:13px;opacity:.78;margin-bottom:18px}
    .list{display:grid;gap:12px}
    .card{display:block;text-decoration:none;color:inherit;background:rgba(10,16,34,.72);border:1px solid rgba(125,194,255,.35);border-radius:12px;padding:13px 14px}
    .card:hover{border-color:rgba(150,220,255,.8)}
    .name{font-weight:700}.meta{opacity:.86;font-size:14px;margin-top:6px}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <h1>每月最热 AI 项目</h1>
    <div class="sub">近 30 天内创建，并按星标排序。</div>
    <div class="tip">规则：AI/Agent/LLM 相关 + created in last 30 days + stars 从高到低。</div>
    <div id="list" class="list">加载中...</div>
  </div>

  <script>
    (async function(){
      var d = new Date();
      d.setDate(d.getDate() - 30);
      var iso = d.toISOString().slice(0,10);
      var q = 'https://api.github.com/search/repositories?q=(agent OR ai OR llm) in:name,description created:>' + iso + ' stars:>200&sort=stars&order=desc&per_page=20';
      var list = document.getElementById('list');
      try {
        var r = await fetch('https://api.github.com/search/repositories?q=' + encodeURIComponent('(agent OR ai OR llm) in:name,description created:>' + iso + ' stars:>200') + '&sort=stars&order=desc&per_page=20', {headers:{Accept:'application/vnd.github+json'}});
        if(!r.ok) throw new Error('api');
        var data = await r.json();
        var items = (data.items || []);
        if(!items.length) throw new Error('empty');
        list.innerHTML = items.map(function(x, i){
          return '<a class="card" href="'+x.html_url+'" target="_blank" rel="noopener noreferrer">'
            + '<div class="name">#'+(i+1)+' '+x.full_name+'</div>'
            + '<div class="meta">⭐ '+(x.stargazers_count||0)+' · '+(x.language||'Unknown')+' · '+(x.description||'No description')+'</div>'
            + '</a>';
        }).join('');
      } catch(e) {
        list.innerHTML = '<div class="card">加载失败。稍后再试。</div>';
      }
    })();
  </script>
</body>
</html>
