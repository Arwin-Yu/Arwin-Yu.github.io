<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本周最热 AI 项目（Trending）</title>
  <style>
    body { margin:0; font-family: Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#eaf2ff;
      background: linear-gradient(180deg,#080b16 0%, #131b35 55%, #202d56 100%); min-height:100vh; }
    .bg{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(6,10,20,.65),rgba(8,12,24,.35)),url('/img/generated-space-v2/002-ultra-cinematic-deep-space-background-fo.png') center/cover no-repeat;}
    .wrap{max-width:980px;margin:0 auto;padding:46px 18px 80px;}
    h1{margin:0 0 8px}.sub{opacity:.85;margin:0 0 18px}
    .tip{font-size:13px;opacity:.78;margin-bottom:18px}
    .list{display:grid;gap:12px}
    .card{display:block;text-decoration:none;color:inherit;background:rgba(10,16,34,.72);border:1px solid rgba(125,194,255,.35);border-radius:12px;padding:13px 14px}
    .card:hover{border-color:rgba(150,220,255,.8)}
    .name{font-weight:700}.meta{opacity:.86;font-size:14px;margin-top:6px}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <h1>本周最热 AI 项目</h1>
    <div class="sub">来源：GitHub Trending（weekly），仅保留 AI/Agent/LLM 相关前 7 项。</div>
    <div class="tip">热度指标：本周新增星标（stars this week）。</div>
    <div id="list" class="list"></div>
  </div>

  <script>
    var WEEKLY = [
      { full_name: 'x1xhlol/system-prompts-and-models-of-ai-tools', url: 'https://github.com/x1xhlol/system-prompts-and-models-of-ai-tools', hot: 9938, language:'Prompt', desc:'System prompts & internal models for popular AI coding tools.' },
      { full_name: 'obra/superpowers', url: 'https://github.com/obra/superpowers', hot: 7985, language:'Shell', desc:'Agentic skills framework and software development methodology.' },
      { full_name: 'huggingface/skills', url: 'https://github.com/huggingface/skills', hot: 5568, language:'Python', desc:'Open skills collection for AI assistants and coding agents.' },
      { full_name: 'muratcankoylan/Agent-Skills-for-Context-Engineering', url: 'https://github.com/muratcankoylan/Agent-Skills-for-Context-Engineering', hot: 3035, language:'Python', desc:'Context engineering patterns for robust multi-agent systems.' },
      { full_name: 'google-research/timesfm', url: 'https://github.com/google-research/timesfm', hot: 1485, language:'Python', desc:'Time-series foundation model from Google Research.' },
      { full_name: 'cloudflare/agents', url: 'https://github.com/cloudflare/agents', hot: 1054, language:'TypeScript', desc:'Build and deploy AI agents on Cloudflare.' },
      { full_name: 'RichardAtCT/claude-code-telegram', url: 'https://github.com/RichardAtCT/claude-code-telegram', hot: 944, language:'Python', desc:'Telegram bridge for remote Claude Code workflows.' }
    ];

    function short(n){ return n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'k' : String(n); }
    document.getElementById('list').innerHTML = WEEKLY.map(function(x,i){
      return '<a class="card" href="'+x.url+'" target="_blank" rel="noopener noreferrer">'
        + '<div class="name">#'+(i+1)+' '+x.full_name+'</div>'
        + '<div class="meta">🔥 本周 +'+short(x.hot)+' · '+x.language+' · '+x.desc+'</div>'
        + '</a>';
    }).join('');
  </script>
</body>
</html>
